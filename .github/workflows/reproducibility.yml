name: Reproducibility

on:
  pull_request:
  push:

jobs:
  run-a-lab-entrypoints:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Validate macOS/Linux entrypoint
        if: runner.os != 'Windows'
        run: |
          bash -n ./scripts/run-lab.sh
          bash ./scripts/run-lab.sh --list

      - name: Validate Windows entrypoint
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\scripts\run-lab.ps1 -List

  redis-cache-failure:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: labs/redis-cache-failure
    steps:
      - uses: actions/checkout@v5

      - name: Validate compose config
        run: docker compose config

      - name: Run experiment and analysis outside tracked results
        run: |
          RESULTS_DIR="${RUNNER_TEMP}/redis-cache-failure-results" bash ./run.sh

      - name: Verify generated artifacts
        run: |
          RESULTS_DIR="${RUNNER_TEMP}/redis-cache-failure-results"
          python scripts/verify_results.py "${RESULTS_DIR}/results.json"
          test -s "${RESULTS_DIR}/results.json"
          test -s "${RESULTS_DIR}/report.md"
          test -s "${RESULTS_DIR}/penetration.png"
          test -s "${RESULTS_DIR}/breakdown.png"
          test -s "${RESULTS_DIR}/avalanche.png"
          test -s "${RESULTS_DIR}/summary.png"

  redis-distributed-lock:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: labs/redis-distributed-lock
    steps:
      - uses: actions/checkout@v5

      - name: Validate compose config
        run: docker compose config

      - name: Run experiment and analysis outside tracked results
        run: |
          RESULTS_DIR="${RUNNER_TEMP}/redis-distributed-lock-results" bash ./run.sh

      - name: Verify generated artifacts
        run: |
          RESULTS_DIR="${RUNNER_TEMP}/redis-distributed-lock-results"
          docker compose run --rm --no-deps analysis python /app/scripts/verify_results.py /data --baseline /baseline
          test -s "${RESULTS_DIR}/01_basic_lock.json"
          test -s "${RESULTS_DIR}/02_redlock.json"
          test -s "${RESULTS_DIR}/03_watchdog.json"
          test -s "${RESULTS_DIR}/report.md"
          test -s "${RESULTS_DIR}/01_basic_lock.png"
          test -s "${RESULTS_DIR}/02_redlock.png"
          test -s "${RESULTS_DIR}/03_watchdog.png"
