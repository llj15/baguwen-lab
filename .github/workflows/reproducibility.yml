name: Reproducibility

on:
  pull_request:
  push:

jobs:
  redis-cache-failure:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: labs/redis-cache-failure
    steps:
      - uses: actions/checkout@v5

      - name: Validate compose config
        run: docker compose config

      - name: Run experiment and analysis outside tracked results
        run: |
          RESULTS_DIR="${RUNNER_TEMP}/redis-cache-failure-results" bash ./run.sh

      - name: Verify generated artifacts
        run: |
          RESULTS_DIR="${RUNNER_TEMP}/redis-cache-failure-results"
          python scripts/verify_results.py "${RESULTS_DIR}/results.json"
          test -s "${RESULTS_DIR}/results.json"
          test -s "${RESULTS_DIR}/report.md"
          test -s "${RESULTS_DIR}/penetration.png"
          test -s "${RESULTS_DIR}/breakdown.png"
          test -s "${RESULTS_DIR}/avalanche.png"
          test -s "${RESULTS_DIR}/summary.png"
